name: Generate Snake

on:
  schedule:
    # rebuild daily so the snake stays current
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # white snake on a red dot ramp to match the profile theme
          outputs: |
            dist/snake.gif?color_snake=%23f0f6fc&color_dots=%23220a0a,%235c1212,%23991f1f,%23d63030,%23ff5555
            dist/snake.svg?color_snake=%23f0f6fc&color_dots=%23220a0a,%235c1212,%23991f1f,%23d63030,%23ff5555

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
