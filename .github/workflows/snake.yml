name: Generate Snake

on:
  schedule:
    # rebuild daily so the snake stays current
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # red / dark themed snake to match the profile
          outputs: |
            dist/snake.gif?color_snake=%23ffd000&color_dots=%233a2222,%237a2b2b,%23a83838,%23d64a4a,%23ff6b6b
            dist/snake.svg?color_snake=%23ffd000&color_dots=%233a2222,%237a2b2b,%23a83838,%23d64a4a,%23ff6b6b

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
